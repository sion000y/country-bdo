  <script>
  
/* ====================================================
   COUNTRY SPA Router
   ページ遷移を履歴API + コンテンツ差し替えで実装
   BGM・ナビは常駐し途切れない
   ==================================================== */
(function() {
  'use strict';

  /* ページ定義 */
  const PAGES = {
    home:     { scripts: ['js/images.js','js/script.js']   },
    gallery:  { scripts: ['js/images.js','js/gallery.js']  },
    schedule: { scripts: ['js/images.js','js/schedule.js'] },
    rules:    { scripts: ['js/images.js','js/rules.js']    },
  };

  const container = document.getElementById('spa-container');

  /* ── スクリプト動的ロード ── */
  const loadedScripts = new Set();
  function loadScript(src) {
    return new Promise(resolve => {
      if (loadedScripts.has(src)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => { loadedScripts.add(src); resolve(); };
      s.onerror = resolve;
      document.body.appendChild(s);
    });
  }

  /* ── ページ切り替え ── */
  async function navigate(pageId, pushState = true) {
    if (!PAGES[pageId]) pageId = 'home';

    /* フェードアウト */
    container.style.opacity = '0';
    container.style.transition = 'opacity 0.22s ease';

    await new Promise(r => setTimeout(r, 220));

    /* コンテンツ差し替え */
    container.innerHTML = PAGE_CONTENTS[pageId] || '';

    /* パーティクルキャンバスをhomeのみ表示 */
    const pc = document.getElementById('particle-canvas');
    if (pc) pc.style.display = pageId === 'home' ? '' : 'none';

    /* bodyのdata-page属性を更新（CSS切り替え用） */
    document.body.setAttribute('data-page', pageId);

    /* スクリプト読み込み → 初期化 */
    for (const src of PAGES[pageId].scripts) {
      await loadScript(src);
    }

    /* 各ページの初期化関数を呼ぶ */
    if (pageId === 'home'     && window.initHome)     window.initHome();
    if (pageId === 'gallery'  && window.initGallery)  window.initGallery();
    if (pageId === 'schedule' && window.initSchedule) window.initSchedule();
    if (pageId === 'rules'    && window.initRules)    window.initRules();
    /* 共通初期化 */
    if (window.initNav)          window.initNav();
    if (window.initReveal)       window.initReveal();
    if (window.initMiniParticles) window.initMiniParticles();
    if (window.initCounters)     window.initCounters();

    /* スクロールトップ */
    window.scrollTo({ top: 0, behavior: 'instant' });

    /* フェードイン */
    container.style.opacity = '1';

      /* アンカースクロール待機フック */
      if (window.__pendingScroll) {
        const target = window.__pendingScroll;
        window.__pendingScroll = null;
        setTimeout(() => {
          const el = document.querySelector(target);
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }, 80);
      }

    /* History API */
    if (pushState) {
      const url = pageId === 'home' ? './' : `./${pageId}.html`;
      history.pushState({ pageId }, '', url);
    }

    /* ナビアクティブ状態更新 */
    document.querySelectorAll('.nav-link').forEach(a => {
      const href = a.getAttribute('href') || '';
      const isActive = href.includes(pageId) || (pageId === 'home' && (href === './' || href === 'index.html' || href === '#'));
      a.classList.toggle('active', isActive);
    });

    /* タイトル更新 */
    const titles = {
      home:     'COUNTRY | 黒い砂漠 ギルド募集 | 拠点戦・青戦・対人コンテンツ・PTコンテンツ',
      gallery:  'ギャラリー | COUNTRY | 黒い砂漠 ギルド活動の記録',
      schedule: '活動スケジュール | COUNTRY | 黒い砂漠 拠点戦・青戦・演奏会・ソラレ',
      rules:    'ギルドルール・加入条件 | COUNTRY | 黒い砂漠 ギルド募集',
    };
    document.title = titles[pageId] || titles.home;
  }

  /* ── リンクのインターセプト ── */
  document.addEventListener('click', e => {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    /* 外部リンク・アンカーは通常遷移 */
    if (!href || href.startsWith('http') || href.startsWith('//') || href.startsWith('mailto')) return;
    /* ページ内アンカー（#about, #join等）→ homeに居なければhome遷移後にスクロール */
    if (href.startsWith('#')) {
      e.preventDefault();
      const scrollTo = (id) => {
        const el = document.querySelector(id);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      };
      const currentPage = document.body.getAttribute('data-page');
      if (currentPage !== 'home') {
        window.__pendingScroll = href;
        navigate('home');
      } else {
        setTimeout(() => scrollTo(href), 30);
      }
      return;
    }
    /* SPAページの判定 */
    const map = {
      './': 'home', 'index.html': 'home',
      'gallery.html': 'gallery',
      'schedule.html': 'schedule',
      'rules.html': 'rules',
    };
    const pageId = map[href];
    if (pageId) {
      e.preventDefault();
      navigate(pageId);
    }
  });

  /* ── ブラウザ戻る/進む ── */
  window.addEventListener('popstate', e => {
    const pageId = e.state?.pageId || 'home';
    navigate(pageId, false);
  });

  /* ── 初期ページ判定 ── */
  function getInitialPage() {
    const path = location.pathname;
    if (path.includes('gallery'))  return 'gallery';
    if (path.includes('schedule')) return 'schedule';
    if (path.includes('rules'))    return 'rules';
    return 'home';
  }

  /* ── 初回ロード ── */
  const initialPage = getInitialPage();
  history.replaceState({ pageId: initialPage }, '', location.href);
  navigate(initialPage, false);

})();

  </script>
